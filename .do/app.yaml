name: postgres-mcp
services:
  - name: mcp
    github:
      repo: Lica-Ventures/postgres-mcp
      branch: main
      deploy_on_push: true
    dockerfile_path: ./Dockerfile
    source_dir: .
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    http_port: 8000
    run_command: >
      postgres-mcp --transport=sse --sse-port=8000 --sse-host=0.0.0.0 --access-mode=$ACCESS_MODE
    envs:
      - key: ACCESS_MODE
        value: restricted
        scope: RUN_TIME
        type: GENERAL
      - key: DATABASE_URI
        value: ${postgres-mcp-db.DATABASE_URL}
        scope: RUN_TIME
        type: GENERAL
    health_check:
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 2
      failure_threshold: 4
      http_path: /sse
      port: 8000
databases:
  - name: postgres-mcp-db
    engine: PG
    version: "15"
    production: true
    cluster_name: mechanigo-production
    db_name: mechanigoph_db_pooling
    db_user: doadmin
