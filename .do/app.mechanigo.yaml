name: postgres-mcp-mechanigo
services:
  - name: mcp
    github:
      repo: Lica-Ventures/postgres-mcp
      branch: main
      deploy_on_push: true
    dockerfile_path: ./Dockerfile
    source_dir: .
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    http_port: 8000
    run_command: >
      postgres-mcp --transport=streamable-http --streamable-http-port=8000 --streamable-http-host=0.0.0.0 --access-mode=$ACCESS_MODE
    envs:
      - key: ACCESS_MODE
        value: restricted
        scope: RUN_TIME
        type: GENERAL
      - key: DATABASE_URI
        value: ${postgres-mcp-db.DATABASE_URL}
        scope: RUN_TIME
        type: GENERAL
      # Auth0 proxy mode — MCP server acts as OAuth AS, proxies to Auth0.
      - key: AUTH0_CLIENT_ID
        value: vvqnZqU7L6so76X8egB4pLF92MkDff1y
        scope: RUN_TIME
        type: GENERAL
      - key: AUTH0_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: AUTH0_ISSUER_URL
        value: https://dev-1whgf1szbodvzfhk.us.auth0.com/
        scope: RUN_TIME
        type: GENERAL
      - key: AUTH0_AUDIENCE
        value: https://mcp.licaventures.com
        scope: RUN_TIME
        type: GENERAL
      - key: MCP_RESOURCE_SERVER_URL
        value: https://pgsql-mcp.mechanigo.ph/mcp
        scope: RUN_TIME
        type: GENERAL
      - key: MCP_REQUIRED_SCOPES
        value: mcp:use
        scope: RUN_TIME
        type: GENERAL
      # Custom domain for SSE clients.
      - key: ALLOWED_HOSTS
        value: pgsql-mcp.mechanigo.ph
        scope: RUN_TIME
        type: GENERAL
    health_check:
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 2
      failure_threshold: 4
      http_path: /.well-known/oauth-protected-resource/mcp
      port: 8000
databases:
  - name: postgres-mcp-db
    engine: PG
    version: "15"
    production: true
    cluster_name: mechanigo-production
    db_name: mechanigoph_db_pooling
    db_user: doadmin
